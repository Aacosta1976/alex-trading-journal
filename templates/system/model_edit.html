{% extends "base.html" %}
{% block title %}Editar Modelo{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header text-gold"><i class="bi bi-pencil me-2"></i>Editar Modelo</div>
      <div class="card-body">
        <form method="post">{% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>{{ field }}
          </div>
          {% endfor %}
          <div class="d-flex gap-2">
            <button class="btn btn-gold">Guardar</button>
            <a href="{% url 'system:index' %}" class="btn btn-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
