{% extends "base.html" %}
{% block title %}Iniciar Sesión — Trading Journal{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card p-4 shadow">
      <div class="text-center mb-4">
        <i class="bi bi-graph-up-arrow text-gold" style="font-size:2.5rem"></i>
        <h3 class="text-gold mt-2 mb-0">Trading Journal</h3>
        <p class="text-subtle small">Inicia sesión para continuar</p>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          {{ form.username }}
        </div>
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          {{ form.password }}
        </div>
        <button type="submit" class="btn btn-gold w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
      </form>

      <hr style="border-color:var(--border)">
      <p class="text-center text-subtle small mb-0">
        ¿No tienes cuenta?
        <a href="{% url 'authentication:register' %}" class="text-cyan">Regístrate</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
